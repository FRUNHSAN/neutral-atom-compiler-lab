# 中性原子量子编译器 — 约束定义
#
# 10 条约束，从 ZAP (IEEE TQE 2026) 论文和源码中提取。
# 每条约束声明了"应该是什么"（formal），不涉及"怎么做到"（implementation）。
#
# 约束分为三层：
#   hard    — 物理定律，编译器必须满足，不可松弛
#   soft    — 优化目标，可以 trade off
#   objective — 最小化/最大化目标

constraints:

  # ── 硬件物理约束（hard）──────────────────────────

  - id: C-qc-connectivity
    name: "双比特门连通性"
    rigidity: hard
    formal: |
      任意双比特门的两个目标原子必须在里德堡阻塞半径 R_blockade 内。
      ∀ g ∈ circuit_2q : dist(atom(g.control), atom(g.target)) ≤ R_blockade
    G_C: 0.9
    domain: neutral-atom

  - id: C-qc-aod-routing
    name: "AOD 运输约束"
    rigidity: hard
    formal: |
      AOD 只能沿行或沿列运输原子。同行/同列原子步调一致。
      任意时刻，一台 AOD 只能运输一个原子。
    G_C: 0.8
    domain: neutral-atom

  - id: C-qc-bandwidth
    name: "并行搬运带宽"
    rigidity: hard
    formal: |
      同一时刻并行搬运的原子数不超过 AOD 通道数。
      ∀ t : N_parallel_moves(t) ≤ N_AOD_channels
    G_C: 0.8
    domain: neutral-atom

  - id: C-qc-slot-assignment
    name: "槽位分配"
    rigidity: hard
    formal: |
      纠缠区中每个坑位（slot）最多被一个原子占用。
      每个参与门计算的原子恰好占据一个坑位。
    G_C: 0.8
    domain: neutral-atom

  - id: C-qc-parking
    name: "搬运轨迹不重叠"
    rigidity: hard
    formal: |
      原子的搬运轨迹不能与其他原子的轨迹重叠。
      避免搬运过程中的原子碰撞。
    G_C: 0.7
    domain: neutral-atom

  # ── 操作约束 ─────────────────────────────────────

  - id: C-qc-crosstalk
    name: "串扰抑制"
    rigidity: hard
    formal: |
      不参与当前 Rydberg 阶段的空闲原子不得暴露于里德堡激光下。
      ∀ a ∈ A_idle(t) : E_Rydberg(a) = 0
      或在 zone 架构中：空闲原子必须在纠缠区之外（存储区）。
    G_C: 0.8
    domain: neutral-atom

  - id: C-qc-transport
    name: "运输时间窗口"
    rigidity: soft
    formal: |
      原子搬运必须在门执行的时间窗口内完成。
      ∀ move : t_move ≤ t_gate_window
    G_C: 0.5
    domain: neutral-atom

  - id: C-qc-decoherence
    name: "退相干约束"
    rigidity: soft
    formal: |
      任意原子的闲置时间不得超过 T2（相干时间）。
      ∀ a : t_idle(a) ≤ T2
    G_C: 0.5
    domain: neutral-atom

  # ── 目标约束（soft / objective）───────────────────

  - id: C-qc-depth
    name: "电路深度最小化"
    rigidity: objective
    formal: |
      minimize depth(P)：最小化编译后电路的执行深度（时间步数）。
    G_C: 0.5
    domain: neutral-atom

  - id: C-qc-fidelity
    name: "保真度约束"
    rigidity: hard
    formal: |
      总保真度不低于阈值 F_min。
      F_total = F_1q × F_2q × F_xtalk × F_transfer × F_coherence ≥ F_min
      其中各通道定义见 ZAP Eq. 4。
    G_C: 0.8
    domain: neutral-atom

# ── 跨编译器差异 ─────────────────────────────────────
#
# 四个编译器共享以上所有约束的 formal 定义。
# 差异在 boundary 层（cost_terms 的参数值、zone 架构选择、搜索范式）。
#
# | 约束          | Enola  | ZAC    | PowerMove | ZAP    |
# |---------------|--------|--------|-----------|--------|
# | C-crosstalk   | ❌ 无保护 | ✅ zone | ✅ zone   | ✅ zone |
# | C-transport   | ✅ A*   | ✅ A*   | ✅ A*     | ✅ A*   |
# | C-bandwidth   | 隐式    | 隐式    | 显式多AOD  | 隐式    |
# | search 范式   | 迭代    | 迭代    | 迭代      | 确定性单遍 |
