# BR-idle-cost-alpha — weight on decoherence cost vs transfer cost
#
# The move_cost in Eq.15 is: transfer_cost + alpha * decoherence_cost
#   alpha = 1.0: transfer and decoherence equally weighted
#   alpha > 1.0: decoherence penalized more → more qubits moved to storage
#   alpha < 1.0: transfer penalized more → fewer qubits moved

id: BR-idle-cost-alpha
name: "Idle cost weight: decoherence vs transfer trade-off"
type: tension
mode: independent
layer: instance

source: C-qc-decoherence
target: C-qc-transport

mediation: "alpha * decoherence_cost weighted against transfer_cost"

resolve_fn:
  name: fixed_alpha
  params:
    alpha: 1.0                   # default equal weighting
    range: [0.1, 10.0]
